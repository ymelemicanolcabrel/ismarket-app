name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Installer Java (necessaire pour Android Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Installer les dependances npm
        run: npm install

      - name: Ajouter la plateforme Android (genere le dossier android/)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "Le dossier android/ existe deja, on saute cette etape."
          fi

      - name: Synchroniser le contenu web vers Android
        run: npx cap sync android

      - name: Autoriser l'execution de gradlew
        run: chmod +x android/gradlew

      - name: Construire l'APK (debug, installable directement)
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Publier l'APK comme fichier telechargeable
        uses: actions/upload-artifact@v4
        with:
          name: ismarket-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
